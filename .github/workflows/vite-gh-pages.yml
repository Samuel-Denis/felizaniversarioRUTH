# Este workflow NÃO usa actions/deploy-pages (evita ficar preso em purging_cdn).
# Publica só na branch gh-pages com peaceiris. Em Settings → Pages usa "Deploy from branch" → gh-pages.
name: Vite → gh-pages (peaceiris)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verificar build de produção
        run: |
          test -f dist/index.html
          if grep -q '/src/main.tsx' dist/index.html; then
            echo "::error::dist/index.html ainda aponta para main.tsx — o build falhou?"
            exit 1
          fi
          if ! grep -q '/felizaniversarioRUTH/assets/' dist/index.html; then
            echo "::error::dist/index.html não contém assets com base /felizaniversarioRUTH/"
            exit 1
          fi
          echo "OK: index de produção válido"

      - name: Push dist para branch gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
          enable_jekyll: false
