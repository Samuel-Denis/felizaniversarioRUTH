# Publica o build em https://<user>.github.io/<repo>/
# Usa a branch gh-pages (não depende da opção "GitHub Actions" em Settings → Pages).
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      # Garante que o deploy não é o index.html de dev (/src/main.tsx → 404 no GitHub)
      - name: Verificar build de produção
        run: |
          test -f dist/index.html
          if grep -q '/src/main.tsx' dist/index.html; then
            echo "::error::dist/index.html ainda aponta para main.tsx — o build falhou?"
            exit 1
          fi
          if ! grep -q '/felizaniversarioRUTH/assets/' dist/index.html; then
            echo "::error::dist/index.html não contém assets com base /felizaniversarioRUTH/"
            exit 1
          fi
          echo "OK: index de produção válido"

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
          # GitHub Pages não deve processar o site com Jekyll (evita ficheiros ignorados)
          enable_jekyll: false
